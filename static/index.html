<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css">
  <link rel="stylesheet" href="style.css?v=23">
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sb-title">Sessions</div>
    <button id="add-session">+ New</button>
    <div id="sessions"></div>
  </div>
  <div id="content">
    <div id="topbar">
      <span id="session-name"></span>
      <span class="spacer"></span>
      <button class="tbtn" id="split-h" title="Split Horizontal (Ctrl+Shift+H)">Split H</button>
      <button class="tbtn" id="split-v" title="Split Vertical (Ctrl+Shift+V)">Split V</button>
    </div>
    <div id="area"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10/lib/addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11/lib/addon-web-links.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11@0.8/lib/addon-unicode11.js"></script>
<script src="app.js?v=25"></script>
</body>
</html>
