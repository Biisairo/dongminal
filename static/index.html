<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css">
  <link rel="stylesheet" href="style.css?v=94">
  <script>try{var w=parseInt(localStorage.getItem('sidebarWidth'));if(w>=100&&w<=400)document.documentElement.style.setProperty('--sb-w',w+'px')}catch(e){}</script>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sb-title">Sessions</div>
    <button id="add-session">+ New</button>
    <button id="add-preset" title="기본 프리셋으로 새 세션">★ Preset</button>
    <div id="sessions"></div>
    <button id="settings-btn" title="Settings">⚙</button>
  </div>
  <div id="sb-handle"></div>
  <div id="content">
    <div id="topbar">
      <span id="session-name"></span>
      <span class="spacer"></span>
      <button class="tbtn" id="split-h" title="Split Horizontal (Ctrl+Shift+H)">Split H</button>
      <button class="tbtn" id="split-v" title="Split Vertical (Ctrl+Shift+V)">Split V</button>
    </div>
    <div id="area"></div>
    <div id="search-bar" class="search-bar hidden">
      <span class="search-icon">⌕</span>
      <input id="search-input" type="text" placeholder="검색...">
      <button id="search-prev" title="이전 (Shift+Enter)">↑</button>
      <button id="search-next" title="다음 (Enter)">↓</button>
      <button id="search-case" title="대소문자 구분">Aa</button>
      <span id="search-count"></span>
      <button id="search-close" title="닫기 (Esc)">✕</button>
    </div>
    <div id="status-bar" class="status-bar"></div>
  </div>
</div>

<!-- Settings Modal -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-header">
      <span class="modal-title">Settings</span>
      <button class="modal-close" id="modal-close">×</button>
    </div>
    <div class="modal-tabs">
      <button class="mtab active" data-tab="theme">Theme</button>
      <button class="mtab" data-tab="shortcuts">Shortcuts</button>
      <button class="mtab" data-tab="statusbar">Status Bar</button>
      <button class="mtab" data-tab="presets">Presets</button>
    </div>
    <div class="modal-body">
      <div class="mpanel" id="panel-theme">
        <div class="theme-layout">
          <div class="theme-list" id="theme-list"></div>
          <div class="theme-preview-panel" id="theme-preview"></div>
        </div>
        <button id="custom-toggle">✏ Customize Current Theme</button>
        <div id="custom-editor" style="display:none">
          <div class="ce-section"><div class="ce-title">UI Colors</div><div class="ce-colors" id="ce-ui"></div></div>
          <div class="ce-section"><div class="ce-title">Terminal Colors</div><div class="ce-colors" id="ce-terminal"></div></div>
        </div>
      </div>
      <div class="mpanel" id="panel-shortcuts" style="display:none">
        <div class="sc-list" id="sc-list"></div>
      </div>
      <div class="mpanel" id="panel-statusbar" style="display:none">
        <div class="sb-settings" id="sb-settings"></div>
      </div>
      <div class="mpanel" id="panel-presets" style="display:none">
        <div class="preset-list" id="preset-list"></div>
        <button id="preset-save" class="preset-save">현재 레이아웃 저장</button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10/lib/addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11/lib/addon-web-links.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11@0.8/lib/addon-unicode11.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-search@0.15/lib/addon-search.js"></script>
<script src="app.js?v=94"></script>
</body>
</html>
